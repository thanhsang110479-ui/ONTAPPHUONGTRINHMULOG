<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>ÔN TẬP PHƯƠNG TRÌNH MŨ - LOGARIT</title>

<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
<script src="question_bank_mulog.js"></script>

<style>
body{
    font-family: Arial;
    background:#1e293b;
    color:white;
    text-align:center;
}
.container{
    width:900px;
    margin:auto;
}
.question{
    font-size:22px;
    margin:20px 0;
}
.btn{
    display:block;
    margin:10px auto;
    padding:10px;
    width:400px;
    background:#334155;
    border:none;
    color:white;
    cursor:pointer;
}
.btn:hover{
    background:#475569;
}
.correct{background:green !important;}
.wrong{background:red !important;}
</style>
</head>

<body>
<div class="container">
<h1>ÔN TẬP PHƯƠNG TRÌNH MŨ - LOGARIT</h1>

<div id="start">
<input id="name" placeholder="Họ và tên"><br><br>
<button onclick="startGame()">Bắt đầu</button>
</div>

<div id="game" style="display:none">
<div id="timer"></div>
<div class="question" id="question"></div>
<div id="answers"></div>
</div>

<div id="result" style="display:none"></div>
</div>

<audio id="intro" src="intro_mulog.mp3"></audio>

<script>
let gameData;
let current=0;
let score=0;
let timerInterval;
let timeLeft=60;

function shuffle(arr){
    return arr.sort(()=>Math.random()-0.5);
}

function buildGame(){
    const g1=shuffle(BANK.filter(q=>q.group===1)).slice(0,7);
    const g2=shuffle(BANK.filter(q=>q.group===2)).slice(0,3);
    const g3=shuffle(BANK.filter(q=>q.group===3)).slice(0,7);
    const g4=shuffle(BANK.filter(q=>q.group===4)).slice(0,3);
    return shuffle([...g1,...g2,...g3,...g4]);
}

function startGame(){
    document.getElementById("start").style.display="none";
    document.getElementById("game").style.display="block";
    document.getElementById("intro").play();
    gameData=buildGame();
    showQuestion();
}

function showQuestion(){
    if(current>=gameData.length){
        endGame();
        return;
    }
    timeLeft=60;
    updateTimer();
    timerInterval=setInterval(()=>{
        timeLeft--;
        updateTimer();
        if(timeLeft<=0){
            clearInterval(timerInterval);
            current++;
            showQuestion();
        }
    },1000);

    const q=gameData[current];
    document.getElementById("question").innerHTML=q.q;
    const ansDiv=document.getElementById("answers");
    ansDiv.innerHTML="";
    ["A","B","C","D"].forEach(k=>{
        const btn=document.createElement("button");
        btn.className="btn";
        btn.innerHTML=k+". "+q[k];
        btn.onclick=()=>checkAnswer(btn,k);
        ansDiv.appendChild(btn);
    });
    MathJax.typeset();
}

function checkAnswer(btn,choice){
    clearInterval(timerInterval);
    const correct=gameData[current].correct;
    if(choice===correct){
        score++;
        btn.classList.add("correct");
    }else{
        btn.classList.add("wrong");
    }
    setTimeout(()=>{
        current++;
        showQuestion();
    },800);
}

function updateTimer(){
    document.getElementById("timer").innerText="Thời gian: "+timeLeft+" giây";
}

function endGame(){
    document.getElementById("game").style.display="none";
    document.getElementById("result").style.display="block";
    document.getElementById("result").innerHTML=
    "<h2>Kết quả: "+score+"/20</h2>";
}
</script>

</body>
</html>
